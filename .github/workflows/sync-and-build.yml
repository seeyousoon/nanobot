name: Sync Upstream and Build

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: HKUDS/nanobot
  UPSTREAM_BRANCH: main

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream

      - name: Backup custom configs and workflows
        id: backup
        run: |
          # 1. 备份 Dockerfile 底部自定义依赖
          if grep -q "# Custom dependencies start" Dockerfile; then
            sed -n '/# Custom dependencies start/,/# Custom dependencies end/p' Dockerfile > /tmp/custom_deps.txt
            echo "has_custom=true" >> $GITHUB_OUTPUT
          else
            echo "has_custom=false" >> $GITHUB_OUTPUT
          fi
          
          # 2. 备份本地的 GitHub Actions 工作流目录
          cp -a .github/workflows /tmp/my_workflows

      - name: Merge upstream
        run: |
          # 尝试合并。-X theirs 无法解决 modify/delete (修改/删除) 冲突。
          # 捕获合并失败，并专门解决 .github/workflows 目录的冲突。
          if ! git merge upstream/${{ env.UPSTREAM_BRANCH }} -X theirs --no-edit; then
            echo "检测到合并冲突，正在自动解决工作流文件的 modify/delete 冲突..."
            
            # 使用 git rm 移除冲突的 workflows 目录，这会告诉 Git 接受“删除”操作，从而解决冲突
            git rm -rf .github/workflows/ || true
            
            # 安全检查：检查是否还有其他非 workflows 目录的未解决冲突
            if git ls-files -u | grep -q "^"; then
              echo "错误：存在 .github/workflows/ 之外的其他未知冲突，请手动检查！"
              git status
              exit 1
            fi
            echo "工作流冲突已解决，准备进入下一步恢复自定义配置..."
          fi

      - name: Restore custom modifications
        run: |
          # 1. 恢复本地的 workflows 目录 (修复了路径找不到的问题)
          # 先移除合并过来的所有 workflow 文件
          git rm -rfq .github/workflows/ || true
          # 重新创建目录
          mkdir -p .github/workflows
          # 将备份的内容完整复制回来 (注意这里的 /. 写法，代表复制目录下所有内容)
          cp -a /tmp/my_workflows/. .github/workflows/
          
          # 2. 恢复中间的 npm build 修改 (使用 HTTPS 替代 SSH)
          perl -pi -e 's|RUN npm install && npm run build|# === 修改开始：强制使用 HTTPS 替代 SSH ===\nRUN git config --global url."https://github.com/".insteadOf ssh://git@github.com/ && \\\n    npm install && npm run build\n# === 修改结束 ===|g' Dockerfile

          # 3. 恢复底部的自定义依赖
          if [ "${{ steps.backup.outputs.has_custom }}" == "true" ]; then
            cat /tmp/custom_deps.txt >> Dockerfile
          fi

          # 4. 将所有恢复的文件添加到暂存区并提交
          git add Dockerfile .github/workflows/
          git diff --cached --quiet || git commit -m "Auto-restore custom dependencies and local workflows"

      - name: Push changes
        run: git push origin main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
