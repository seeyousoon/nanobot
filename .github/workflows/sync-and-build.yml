name: Sync Upstream and Build

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: HKUDS/nanobot
  UPSTREAM_BRANCH: main

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream

      - name: Backup custom Dockerfile changes
        id: backup
        run: |
          if grep -q "# Custom dependencies start" Dockerfile; then
            sed -n '/# Custom dependencies start/,/# Custom dependencies end/p' Dockerfile > /tmp/custom_deps.txt
            echo "has_custom=true" >> $GITHUB_OUTPUT
          else
            echo "has_custom=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream
        run: |
          # 使用 -X theirs 策略：遇到冲突时，无条件使用上游(upstream)的代码
          # 这样可以保证 merge 永远不会因为 Dockerfile 冲突而失败
          git merge upstream/${{ env.UPSTREAM_BRANCH }} -X theirs --no-edit

      - name: Restore custom modifications
        run: |
          # 1. 恢复中间的 npm build 修改 (使用 perl 替换，避免 sed 的特殊字符转义问题)
          # 这一步会在上游干净的 Dockerfile 中找到 npm install 那行，并替换为你需要的 HTTPS 版本
          perl -pi -e 's|RUN npm install && npm run build|# === 修改开始：强制使用 HTTPS 替代 SSH ===\nRUN git config --global url."https://github.com/".insteadOf ssh://git@github.com/ && \\\n    npm install && npm run build\n# === 修改结束 ===|g' Dockerfile

          # 2. 恢复底部的自定义依赖
          if [ "${{ steps.backup.outputs.has_custom }}" == "true" ]; then
            cat /tmp/custom_deps.txt >> Dockerfile
          fi

          # 3. 提交修改
          git add Dockerfile
          git diff --cached --quiet || git commit -m "Auto-restore custom dependencies and build configs"

      - name: Push changes
        run: git push origin main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
